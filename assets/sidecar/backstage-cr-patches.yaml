apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  name: ai-rh-developer-hub
  namespace: ai-rhdh
spec:
  application:
    extraFiles:
      secrets:
        - name: rhdh-rhoai-bridge-token
          mountPath: /opt/app-root/src
          key: token
  deployment:
    patch:
      spec:
        template:
          spec:
            containers:
              - name: backstage-backend
              - env:
                  - name: POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: POD_NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                envFrom:
                  - secretRef:
                      name: rhdh-rhoai-bridge-token
                  - secretRef:
                      name: ai-rh-developer-hub-env
                image: quay.io/gabemontero/model-catalog-bridge-location:latest
                imagePullPolicy: Always
                name: location
                ports:
                  - containerPort: 9090
                    name: location
                    protocol: TCP
                volumeMounts:
                  - mountPath: /opt/app-root/src/dynamic-plugins-root
                    name: dynamic-plugins-root
                workingDir: /opt/app-root/src
              - env:
                  - name: STORAGE_TYPE
                    value: ConfigMap
                  - name: BKSTG_URL
                    value: https://backstage-ai-rh-developer-hub-ai-rhdh.apps.gmontero416.devcluster.openshift.com
                  - name: POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: POD_NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                envFrom:
                  - secretRef:
                      name: rhdh-rhoai-bridge-token
                  - secretRef:
                      name: ai-rh-developer-hub-env
                image: quay.io/gabemontero/model-catalog-bridge-storage-rest:latest
                imagePullPolicy: Always
                name: storage-rest
                ports:
                  - containerPort: 9090
                    name: location
                    protocol: TCP
                volumeMounts:
                  - mountPath: /opt/app-root/src/dynamic-plugins-root
                    name: dynamic-plugins-root
                workingDir: /opt/app-root/src
              - env:
                  - name: MR_ROUTE
                    value: odh-model-registries-modelregistry-public-rest
                  - name: BKSTG_URL
                    value: https://backstage-ai-rh-developer-hub-ai-rhdh.apps.gmontero416.devcluster.openshift.com
                  - name: POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: POD_NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                envFrom:
                  - secretRef:
                      name: rhdh-rhoai-bridge-token
                  - secretRef:
                      name: ai-rh-developer-hub-env
                image: quay.io/gabemontero/model-catalog-bridge-rhoai-normalizer:latest
                imagePullPolicy: Always
                name: rhoai-normalizer
                ports:
                  - containerPort: 9090
                    name: location
                    protocol: TCP
                volumeMounts:
                  - mountPath: /opt/app-root/src/dynamic-plugins-root
                    name: dynamic-plugins-root
                workingDir: /opt/app-root/src
            replicas: 1
